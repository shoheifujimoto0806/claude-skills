schema_version: 1
job_id: caddi-newbiz-eng-mgr
client: キャディ株式会社
created_at: 2026-03-26
requirements:
  title: 新規事業開発エンジニア マネージャー候補/マネージャー
  must_have:
    - Webアプリケーションの開発・運用経験（3年以上）
    - フロントエンド（React, Vue.js等）およびバックエンド（Go, TypeScript/Node.js, Python, Ruby等）双方の開発経験
    - クラウド環境（AWS, GCP等）を用いたインフラ構築・運用経験
    - Git等を用いたチームでの開発経験
    - 日本語での流暢なコミュニケーション（日本での就業経験3年以上）
  nice_to_have:
    - 新規事業立ち上げまたはスタートアップ初期フェーズ（0→1）でのプロダクト開発経験
    - アジャイル/スクラム開発のリード経験
    - Figma等のデザインツールを用いたUI/UX検討経験
    - ユーザーインタビュー等のリサーチから開発要件に落とし込んだ経験
  years_experience: 3
  salary_range: "800-1,500万円"
  notes: |
    固定残業代45時間含む。成果に応じた変動賞与制（上限なし）。
    評価により別途ストックオプション付与あり。昇給/昇格・賞与支給は年2回。
    ハイブリッドワーク（週1〜3日オフィス出社）。フレックスタイム制（コアタイム10:00〜17:00）。
personas:
  - name: SaaS企業のフルスタックエンジニア（0→1経験あり）
    background: |
      SaaS企業で3〜5年のフルスタック開発経験を積み、新機能の立ち上げや小規模プロダクトの0→1を経験。
      React + TypeScript/Node.js が主戦場で、AWSでのインフラ構築も一通りできる。
      現職では既存プロダクトの保守・改善が中心になりつつあり、もう一度ゼロから作る経験を求めている。
      30代前半、リーダー〜マネージャー手前のポジション。
    keywords: [フルスタック, React, TypeScript, Node.js, AWS, 新規事業, MVP, アジャイル, full-stack, startup]
    target_companies: [SmartHR, freee, LayerX, Ubie, HERP, estie, ログラス, Asobica, カミナシ, BECAUSE]
    target_titles: [フルスタックエンジニア, テックリード, エンジニアリングマネージャー候補, Full-Stack Engineer, Tech Lead]
    career_motivation: |
      現職の既存プロダクト改善に物足りなさを感じ、0→1で事業インパクトを出せる環境を求めている。
      技術だけでなく事業側にも関わりたいが、現職ではエンジニアリングに閉じた役割になっている。
  - name: スタートアップCTOクラス（技術と事業の両輪を回してきた人）
    background: |
      スタートアップでCTO/VPoE/開発責任者として、プロダクトの企画〜実装〜運用を一気通貫で担ってきた。
      チーム規模5〜15名程度のマネジメント経験あり。技術選定からアーキテクチャ設計まで自らリードしてきた。
      直近の事業がイグジットまたはピボットを経て、次の挑戦を探している。
      事業志向が強く、顧客課題の理解から逆算して技術を選べる人。
    keywords: [CTO, VPoE, 開発責任者, スタートアップ, 新規事業, プロダクト開発, アーキテクチャ, engineering manager]
    target_companies: [BECAUSE, プレイド, Autify, LeapMind, AI inside, FLUX, ヘイ, note, Baseconnect, フライル]
    target_titles: [CTO, VPoE, 開発責任者, エンジニアリングマネージャー, Engineering Manager, Head of Engineering]
    career_motivation: |
      前職のスタートアップでの経験を活かしつつ、より大きなスケールで0→1に挑戦したい。
      単独での開発ではなく、製造業という巨大市場でのインパクトに惹かれる可能性がある。
evaluation_framework:
  score_criteria:
    5: "フルスタック開発3年以上 + 0→1経験 + マネジメント経験。即戦力として高い確信"
    4: "フルスタック開発3年以上 + 0→1またはマネジメントのいずれか。十分にマッチ"
    3: "フルスタック開発経験はあるが、フロントまたはバックのどちらかに偏り。ポテンシャル採用"
    2: "バックエンドのみ、またはフロントエンドのみの経験。フルスタックへの転換意欲が必要"
    1: "Web開発経験が乏しい、または求人要件と方向性が異なる"
  job_specific_criteria:
    - "React/Vue.js + バックエンド言語（Go/TypeScript/Python/Ruby）の両方の実務経験があるか → スコア4以上の必須条件"
    - "AWS or GCPでのインフラ構築経験があるか → スコア4以上の必須条件"
    - "新規事業/0→1フェーズでの開発経験があるか → スコア+1の加点"
    - "マネジメント経験（3名以上）があるか → スコア+1の加点"
    - "アジャイル/スクラムのリード経験があるか → 加点要素"
  bonus_factors:
    - 新規事業立ち上げ経験
    - マネジメント経験
    - アジャイル/スクラムリード経験
    - UI/UX設計経験
    - ユーザーリサーチ経験
  attention_point_rules: |
    マッチ度4以上の候補者に3点程度の着目ポイントを作成。
    各ポイントは「◎」で始め、推測は「〜ではないかとお見受けしています」と明記。
    特に以下の観点で着目:
    - フルスタックでの開発実績（フロント+バック+インフラ）
    - 0→1フェーズでのプロダクト立ち上げ経験
    - 事業志向・オーナーシップの強さ
search_conditions:
  keywords: [フルスタック, React, TypeScript, Node.js, 新規事業, MVP]
  broad_keywords: [エンジニア, Webエンジニア, ソフトウェアエンジニア, フルスタックエンジニア]
  narrow_keywords: [React, TypeScript, Go, AWS, GCP, 新規事業, 0→1, アジャイル, スクラム, テックリード]
scout_message_base: |
  {候補者名}様

  はじめまして。
  合同会社Plus X代表の藤本と申します。

  弊社は興味深いポジション・ビジネスを有している企業の
  紹介に強みを持つヘッドハンティング会社です。

  ご経験を拝見し、
  ぜひとも【製造業向けデータプラットフォームを展開する急成長スタートアップの新規事業開発エンジニア（マネージャー候補）】を
  ご紹介させていただきたく、ご連絡させていただきました。

  【着目させていただいたポイント】
  {着目ポイント}
  ▶︎上記のご経験から、本ポジションにおいて大きな成果を発揮いただけると考えております。

  【求人の魅力】
  ◎ 製造業という巨大市場に向けたデータプラットフォームの新規事業を0→1で立ち上げるポジション。構想〜実装までをリードできる
  ◎ 200億円以上の大型資金調達を実施済み。グローバル展開も進む急成長フェーズで、事業インパクトの大きい挑戦ができる
  ◎ 年収800〜1,500万円、SO制度あり。フルスタックで技術選定から関われる裁量の大きさ

  もし少しでもご興味をお持ちいただけましたら、
  求人のご案内のお時間を頂戴できないでしょうか。

  {日程調整セクション}

  是非とも少しでもお話をするお時間を頂戴できますと幸いです。
  ご返信いただけることを心よりお待ちしております。
